<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Planner Map Dev Page</title>

    <style>
        html, body { margin: 0; height: 100%; }
        #map { width: 600px; height: 400px; margin: auto;}
        #planner { margin-bottom: 50px; }
        .marker {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="planner-selection">
        <h4>How would you like to plan your trip:</h4>
        <button id="planner-regionOption">Find attractions near your destinations</button>
        <button id="planner-categoryOption">Pick from a range of categories</button>
        <select id="planner-locationSelect"></select>
        <ol type="1" id="planner-tripList"></ol>
    </div>
    <div id="map"></div>
    <button id="planner-tripExport">Export To Google Maps</button>
    <script type="module" src="./main.js"></script>
    <div id="planner-preview">
        <h5 id="planner-preview-title">Select a location to begin</h5>
        <img>
        <p></p>
        <button id="planner-preview-addToTrip"></button>
    </div>
</body>
</html>
